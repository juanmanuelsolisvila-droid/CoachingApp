<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juanma Solís Coach</title>

<style>
.selected-meso {
  border: 2px solid #4CAF50;
}

.meso-block {
  border:1px solid #333;
  border-radius:12px;
  padding:16px;
  margin-bottom:20px;
}

.week-block {
  margin-top:16px;
  padding:12px;
  border:1px solid #333;
  border-radius:8px;
}
</style>

</head>

<body>

<div id="app">

<!-- NEW: mesociclos page -->
<div class="page" id="page-mesociclos">
  <h1>Mesociclos</h1>
  <div id="meso-container"></div>
</div>

</div>

<script>

// NEW: navigation to mesociclos
function editMeso(mesoId){
  window.selectedMesoId = mesoId;
  showPage("page-mesociclos");
  renderMesociclosPage();
}

// MOCK showPage
function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById(id).style.display="block";
}

// MOCK DATA
let DB = {
  macros: [
    {
      id:"m1",
      mesocycles:[
        {id:"1", name:"Meso 1", weeksCount:4, weeks:[]},
        {id:"2", name:"Meso 2", weeksCount:3, weeks:[]}
      ]
    }
  ]
};

function getCurrentMacro(){
  return DB.macros[0];
}

// NEW: mesociclos page
function renderMesociclosPage(){
  const container = document.getElementById("meso-container");
  container.innerHTML = "";

  const macro = getCurrentMacro();

  macro.mesocycles.forEach(meso => {

    if(!meso.weeks) meso.weeks = [];

    const div = document.createElement("div");
    div.className = "meso-block";
    div.id = "meso-" + meso.id;

    if(window.selectedMesoId === meso.id){
      div.classList.add("selected-meso");
      setTimeout(()=> div.scrollIntoView({behavior:"smooth"}),200);
    }

    div.innerHTML = `
      <h2>${meso.name}</h2>

      <input value="${meso.name}" onchange="updateMesoName('${meso.id}', this.value)">
      <input type="number" value="${meso.weeksCount || 4}" 
        onchange="updateWeeks('${meso.id}', this.value)">

      <button onclick="addWeek('${meso.id}')">➕ Agregar semana</button>

      <h3>Objetivos del Mesociclo</h3>

      <input placeholder="RPE" onchange="updateObjective('${meso.id}','rpe',this.value)">
      <input placeholder="Volumen" onchange="updateObjective('${meso.id}','volumen',this.value)">
      <input placeholder="%RM" onchange="updateObjective('${meso.id}','rm',this.value)">

      <input placeholder="Empuje" onchange="updatePattern('${meso.id}','empuje',this.value)">
      <input placeholder="Tracción" onchange="updatePattern('${meso.id}','traccion',this.value)">
      <input placeholder="Cadera" onchange="updatePattern('${meso.id}','cadera',this.value)">
      <input placeholder="Rodilla" onchange="updatePattern('${meso.id}','rodilla',this.value)">
      <input placeholder="Core" onchange="updatePattern('${meso.id}','core',this.value)">

      <div>
        ${renderWeeks(meso)}
      </div>
    `;

    container.appendChild(div);
  });
}

// NEW: objectives system
function updateObjective(mesoId, key, value){
  const meso = findMeso(mesoId);
  if(!meso.objectives) meso.objectives = { patrones:{} };
  meso.objectives[key] = value;
}

function updatePattern(mesoId, key, value){
  const meso = findMeso(mesoId);
  if(!meso.objectives) meso.objectives = { patrones:{} };
  meso.objectives.patrones[key] = value;
}

// NEW: dynamic weeks generation
function updateWeeks(mesoId, num){
  const meso = findMeso(mesoId);
  num = parseInt(num);

  if(!meso.weeks) meso.weeks = [];

  if(meso.weeks.length < num){
    while(meso.weeks.length < num){
      meso.weeks.push({});
    }
  } else {
    meso.weeks = meso.weeks.slice(0, num);
  }

  meso.weeksCount = num;
  renderMesociclosPage();
}

function addWeek(mesoId){
  const meso = findMeso(mesoId);
  if(!meso.weeks) meso.weeks = [];
  meso.weeks.push({});
  meso.weeksCount = meso.weeks.length;
  renderMesociclosPage();
}

function renderWeeks(meso){
  return meso.weeks.map((w,i)=>`
    <div class="week-block">
      <h3>Semana ${i+1}</h3>

      <div>
        RPE: ${meso.objectives?.rpe || "-"} |
        Volumen: ${meso.objectives?.volumen || "-"} |
        %RM: ${meso.objectives?.rm || "-"}
      </div>

      <div>
        <!-- weekly planner reused -->
      </div>
    </div>
  `).join("");
}

function updateMesoName(id,val){
  const meso = findMeso(id);
  meso.name = val;
}

function findMeso(id){
  const macro = getCurrentMacro();
  return macro.mesocycles.find(m=>m.id===id);
}

// INIT
showPage("page-mesociclos");
renderMesociclosPage();

</script>

</body>
</html>
